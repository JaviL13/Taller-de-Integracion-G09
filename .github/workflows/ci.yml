name: CI/CD Pipeline - QGIS Plugin

on:
  push:
      branches:
            - main
                  - develop
                    pull_request:
                        branches:
                              - main
                                    - develop

                                jobs:
                                      lint:
                                          name: Lint
                                              runs-on: ubuntu-latest
                                                  steps:
                                                        - name: Checkout code
                                                                uses: actions/checkout@v4

                                                                      - name: Set up Python
                                                                              uses: actions/setup-python@v5
                                                                                      with:
                                                                                                python-version: '3.12'
                                                                                                          cache: 'pip'
                                                                                                          
                                                                                                                - name: Install lint dependencies
                                                                                                                        run: |
                                                                                                                                  pip install flake8 pylint
                                                                                                                                  
                                                                                                                                        - name: Run flake8
                                                                                                                                                run: flake8 . --max-line-length=120 --exclude=.git,__pycache__,*.egg-info
                                                                                                                                                
                                                                                                                                                      - name: Run pylint
                                                                                                                                                              run: pylint **/*.py --disable=C0114,C0115,C0116 || true
                                                                                                                                                              
                                                                                                                                                                test:
                                                                                                                                                                    name: Test
                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                            needs: lint
                                                                                                                                                                                steps:
                                                                                                                                                                                      - name: Checkout code
                                                                                                                                                                                              uses: actions/checkout@v4
                                                                                                                                                                                              
                                                                                                                                                                                                    - name: Set up Python
                                                                                                                                                                                                            uses: actions/setup-python@v5
                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                              python-version: '3.12'
                                                                                                                                                                                                                                        cache: 'pip'
                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                              - name: Install test dependencies
                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                pip install pytest pytest-cov
                                                                                                                                                                                                                                                                          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                - name: Run tests with coverage
                                                                                                                                                                                                                                                                                        run: pytest --cov=. --cov-report=xml --cov-report=term-missing
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                              - name: Upload coverage report
                                                                                                                                                                                                                                                                                                      uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                              if: always()
                                                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                                                name: coverage-report
                                                                                                                                                                                                                                                                                                                                          path: coverage.xml
                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                            build:
                                                                                                                                                                                                                                                                                                                                                name: Build
                                                                                                                                                                                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                        needs: test
                                                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                                                  - name: Checkout code
                                                                                                                                                                                                                                                                                                                                                                          uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                - name: Set up Python
                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                          python-version: '3.12'
                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Package QGIS plugin
                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                          PLUGIN_NAME=$(basename "$GITHUB_REPOSITORY")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    mkdir -p dist
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              zip -r "dist/${PLUGIN_NAME}.zip" . \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --exclude "*.git*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --exclude "*.github*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --exclude "*__pycache__*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --exclude "*.pytest_cache*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --exclude "dist/*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --exclude "tests/*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --exclude "*.egg-info*" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --exclude "coverage.xml" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --exclude "*.pyc"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Verify plugin installation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  PLUGIN_NAME=$(basename "$GITHUB_REPOSITORY")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            INSTALL_DIR="$HOME/.local/share/QGIS/QGIS3/profiles/default/python/plugins"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      mkdir -p "$INSTALL_DIR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                unzip -o "dist/${PLUGIN_NAME}.zip" -d "$INSTALL_DIR"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "Plugin extracted to: $INSTALL_DIR/$PLUGIN_NAME"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "Directory contents:"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ls -la "$INSTALL_DIR/$PLUGIN_NAME"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Verify main module import
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      PLUGIN_NAME=$(basename "$GITHUB_REPOSITORY")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                INSTALL_DIR="$HOME/.local/share/QGIS/QGIS3/profiles/default/python/plugins"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          export PYTHONPATH="${INSTALL_DIR}:${PYTHONPATH}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    python -c "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              import sys, os
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        plugin_path = os.path.join('$INSTALL_DIR', '$PLUGIN_NAME')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  sys.path.insert(0, plugin_path)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Verify required QGIS plugin files exist
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      required_files = ['__init__.py', 'metadata.txt']
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                missing = [f for f in required_files if not os.path.exists(os.path.join(plugin_path, f))]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if missing:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f'ERROR: Missing required files: {missing}')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      sys.exit(1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Import the main plugin module
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          import importlib.util
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    spec = importlib.util.spec_from_file_location(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '$PLUGIN_NAME',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                os.path.join(plugin_path, '__init__.py')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    module = importlib.util.module_from_spec(spec)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              spec.loader.exec_module(module)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print('Plugin module imported successfully')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print(f'Module: {module}')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Validate metadata.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    PLUGIN_NAME=$(basename "$GITHUB_REPOSITORY")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              INSTALL_DIR="$HOME/.local/share/QGIS/QGIS3/profiles/default/python/plugins"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        python -c "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  import configparser, sys, os
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            metadata_path = os.path.join('$INSTALL_DIR', '$PLUGIN_NAME', 'metadata.txt')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      config = configparser.ConfigParser()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                config.read(metadata_path)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          required_fields = ['name', 'description', 'version', 'qgisMinimumVersion', 'author', 'email']
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    missing = [f for f in required_fields if not config.get('general', f, fallback=None)]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if missing:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f'ERROR: Missing metadata fields: {missing}')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          sys.exit(1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    print('metadata.txt is valid')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              for field in required_fields:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f'  {field}: {config.get(\"general\", field)}')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Upload plugin artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      name: qgis-plugin
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                path: dist/*.zip
