name: CI/CD Pipeline - QGIS Plugin

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          pip install ruff pylint

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run pylint
        run: pylint **/*.py --disable=C0114,C0115,C0116 || true

  test:
    name: Test (Pure Python)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pure Python tests
        run: pytest -m "not qgis" --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-pure-python
          path: coverage.xml

  test-qgis:
    name: Test (QGIS Integration)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: qgis/qgis:release-3_34
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pytest-qgis and project dependencies
        run: |
          pip3 install pytest pytest-qgis==2.1.0 pytest-cov
          pip3 install rasterio numpy shapely
          pip3 install -r requirements.txt || true

      - name: Run QGIS integration tests
        env:
          QT_QPA_PLATFORM: offscreen
          QGIS_PREFIX_PATH: /usr
        run: |
          pytest tests/test_qgis_integration.py tests/test_annotation_persistence.py \
            -m "qgis" -v \
            --qgis_disable_exit \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-qgis
          path: coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, test-qgis]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: qgis-plugin
          path: dist/*.zip