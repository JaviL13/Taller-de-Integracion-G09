name: CI/CD Pipeline

on:
  push:
      branches:
            - main
                  - develop
                    pull_request:
                        branches:
                              - main
                                    - develop

                                    jobs:
                                      lint:
                                          name: Lint
                                              runs-on: ubuntu-latest
                                                  steps:
                                                        - name: Checkout code
                                                                uses: actions/checkout@v4

                                                                      - name: Set up Node.js
                                                                              uses: actions/setup-node@v4
                                                                                      with:
                                                                                                node-version: '20'
                                                                                                          cache: 'npm'
                                                                                                          
                                                                                                                - name: Install dependencies
                                                                                                                        run: npm ci
                                                                                                                        
                                                                                                                              - name: Run linter
                                                                                                                                      run: npm run lint
                                                                                                                                      
                                                                                                                                        test:
                                                                                                                                            name: Test
                                                                                                                                                runs-on: ubuntu-latest
                                                                                                                                                    needs: lint
                                                                                                                                                        steps:
                                                                                                                                                              - name: Checkout code
                                                                                                                                                                      uses: actions/checkout@v4
                                                                                                                                                                      
                                                                                                                                                                            - name: Set up Node.js
                                                                                                                                                                                    uses: actions/setup-node@v4
                                                                                                                                                                                            with:
                                                                                                                                                                                                      node-version: '20'
                                                                                                                                                                                                                cache: 'npm'
                                                                                                                                                                                                                
                                                                                                                                                                                                                      - name: Install dependencies
                                                                                                                                                                                                                              run: npm ci
                                                                                                                                                                                                                              
                                                                                                                                                                                                                                    - name: Run tests
                                                                                                                                                                                                                                            run: npm test
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                  - name: Upload coverage report
                                                                                                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                  if: always()
                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                    name: coverage-report
                                                                                                                                                                                                                                                                                              path: coverage/
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                build:
                                                                                                                                                                                                                                                                                                    name: Build
                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                            needs: test
                                                                                                                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                                                                                                                      - name: Checkout code
                                                                                                                                                                                                                                                                                                                              uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                    - name: Set up Node.js
                                                                                                                                                                                                                                                                                                                                            uses: actions/setup-node@v4
                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                              node-version: '20'
                                                                                                                                                                                                                                                                                                                                                                        cache: 'npm'
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                              - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                      run: npm ci
                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                            - name: Build project
                                                                                                                                                                                                                                                                                                                                                                                                    run: npm run build
                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                          - name: Upload build artifacts
                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                    name: build-artifacts
                                                                                                                                                                                                                                                                                                                                                                                                                                              path: dist/
