line-length = 120
target-version = "py38"

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E402",  # module-level import not at top (Qt imports in PyQGIS require deferred loading)
    "W191",  # indentation contains tabs
    "E101",  # indentation contains mixed spaces and tabs
    "E117",  # over-indented
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "E402"]  # Qt/QGIS classFactory pattern
"resources.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
