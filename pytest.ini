# TIGS 93: Integrar QGIS en el pipeline de CI 

# Este archivo configura pytest en el proyecto.
# La sección [markers] registra las etiquetas que se pusieron en conftest.py para clasificar los tests. 
# Sin este registro, pytest mostraría advertencias de "unknown mark" al correr los tests.

[pytest]
markers =
    qgis: Tests que requieren QGIS instalado. Corren en Docker CI.
    pure_python: Tests que no necesitan QGIS. Corren en el pipeline normal.
    benchmark: Tests de rendimiento (no corren en CI por defecto).